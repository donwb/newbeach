name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: beach
          POSTGRES_PASSWORD: beach
          POSTGRES_DB: beach_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U beach"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: api/go.sum

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Vet
        working-directory: api
        run: go vet ./...

      - name: Staticcheck
        working-directory: api
        run: staticcheck ./...

      - name: Test
        working-directory: api
        run: go test -race -coverprofile=coverage.out ./...
        env:
          DATABASE_URL: postgres://beach:beach@localhost:5432/beach_test?sslmode=disable

      - name: Build
        working-directory: api
        run: go build -o beach-api ./cmd/server
