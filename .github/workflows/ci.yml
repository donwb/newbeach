name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: beach
          POSTGRES_PASSWORD: beach
          POSTGRES_DB: beach_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U beach"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: api/go.sum

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Vet
        working-directory: api
        run: go vet ./...

      - name: Staticcheck
        working-directory: api
        run: staticcheck ./...

      - name: Test
        working-directory: api
        run: go test -race -coverprofile=coverage.out ./...
        env:
          DATABASE_URL: postgres://beach:beach@localhost:5432/beach_test?sslmode=disable

      - name: Build
        working-directory: api
        run: go build -o beach-api ./cmd/server

  deploy:
    runs-on: ubuntu-latest
    needs: [lint-test-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Deploy to App Platform
        run: doctl apps create-deployment ${{ secrets.APP_ID }} --wait

      - name: Smoke test
        run: |
          sleep 30
          curl -sf https://donwb.com/api/v2/health || exit 1
